name: Frontend CI/CD

on:
  push:
    paths:
      - 'frontend/**'
  pull_request:
    paths:
      - 'frontend/**'

concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dev-stage:
    name: Dev Stage (Build)
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Inject DEV env
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" >> frontend/.env.development
          echo "VITE_DEFAULT_TENANT_ID=${{ secrets.VITE_DEFAULT_TENANT_ID }}" >> frontend/.env.development
          echo "VITE_APP_NAME=${{ secrets.VITE_APP_NAME }}" >> frontend/.env.development
          echo "VITE_APP_VERSION=${{ secrets.VITE_APP_VERSION }}" >> frontend/.env.development
          echo "VITE_ENVIRONMENT=development" >> frontend/.env.development
          echo "VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}" >> frontend/.env.development
          echo "VITE_ANALYTICS_ID=${{ secrets.VITE_ANALYTICS_ID }}" >> frontend/.env.development

      - name: Build Frontend
        run: |
          cd frontend
          npm run build -- --mode development

  prod-stage:
    name: Prod Stage (Deploy)
    runs-on: ubuntu-latest
    needs: dev-stage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Inject PROD env
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" >> frontend/.env.production
          echo "VITE_DEFAULT_TENANT_ID=${{ secrets.VITE_DEFAULT_TENANT_ID }}" >> frontend/.env.production
          echo "VITE_APP_NAME=${{ secrets.VITE_APP_NAME }}" >> frontend/.env.production
          echo "VITE_APP_VERSION=${{ secrets.VITE_APP_VERSION }}" >> frontend/.env.production
          echo "VITE_ENVIRONMENT=production" >> frontend/.env.production
          echo "VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}" >> frontend/.env.production
          echo "VITE_ANALYTICS_ID=${{ secrets.VITE_ANALYTICS_ID }}" >> frontend/.env.production

      - name: Build Frontend
        run: |
          cd frontend
          npm run build -- --mode production

      # - name: Deploy Frontend
      #   run: |
      #     echo "Deploying frontend to production..."
      #     # Add your actual deployment command here (e.g., S3, Vercel, Netlify, etc.)
